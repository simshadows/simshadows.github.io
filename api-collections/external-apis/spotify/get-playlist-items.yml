info:
  name: get-playlist-items
  type: http
  seq: 3

http:
  method: GET
  url: https://api.spotify.com/v1/playlists/{{playlistId}}/items?market=AU
  params:
    - name: market
      value: AU
      type: query
    - name: fields
      value: items(added_by.id,track(name,href,album(name,href)))
      type: query
      disabled: true
  auth: inherit

runtime:
  variables:
    - name: playlistId
      value: 0dKxk1EuA0Zadmq1fgI0xh
  scripts:
    - type: before-request
      code: |-
        const accessToken = bru.getOauth2CredentialVar("access_token");
        req.setHeader("Authorization", "Bearer " + accessToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
